name: Update sitemap lastmod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sitemap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update lastmod date
        run: |
          TODAY="$(date -u +%F)"
          sed -E -i "s#<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>#<lastmod>${TODAY}</lastmod>#g" sitemap.xml

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "No sitemap changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore(seo): refresh sitemap lastmod"
          git push
